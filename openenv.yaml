spec_version: 1
name: datacenter-env
type: environment
runtime: docker
app: server/app.py
port: 7860

metadata:
  title: "Sustainable Data Center RL Environment"
  description: "AI agent minimizes carbon emissions while managing server cooling, renewable energy, and workload scheduling"
  version: "2.0.0"
  author: "abhinavtiwary"
  license: "mit"
  tags:
    - reinforcement-learning
    - sustainability
    - data-center
    - green-computing
    - openenv
    - infrastructure-ai

environment:
  action_type: DataCenterAction
  observation_type: DataCenterObservation
  state_type: DataCenterState
  episode_length: 72
  action_space: "Discrete(4x3x4x2) — cooling_level, workload, power_source, defer"
  observation_space: "Dict — server racks, energy metrics, weather, workload"

tasks:
  - id: easy_task
    name: easy
    description: "Low workload variance, rare failures, clear weather"
    pass_criterion: "score >= 0.7"
    difficulty: easy
    grader: "server.datacenter_environment:grade_easy"

  - id: medium_task
    name: medium
    description: "Moderate variance, occasional storms, balanced workload"
    pass_criterion: "score >= 0.6"
    difficulty: medium
    grader: "server.datacenter_environment:grade_medium"

  - id: hard_task
    name: hard
    description: "High variance, frequent storms, heavy workload, fog"
    pass_criterion: "score >= 0.5"
    difficulty: hard
    grader: "server.datacenter_environment:grade_hard"

rewards:
  temperature_safe: 2.0
  renewable_good: 3.0
  pue_good: 2.0
  task_throughput: 0.03
  rack_failure: -8.0
  temperature_critical: -3.0
  episode_bonus: 30.0
  score_range: "[-100.0, 150.0]"